[build-system]
# Pinned build backend for reproducible isolated builds (pip build isolation
# installs exactly these; not a moving "latest").
requires = ["setuptools==80.9.0", "wheel==0.45.1"]
build-backend = "setuptools.build_meta"

[project]
name = "invoice-extractor"
description = "Batch invoice PDF extraction to Excel (text + vision LLM routes)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
dynamic = ["version"]

# DIRECT runtime dependencies only - the human-readable source of truth. Exact
# transitive pins for the reproducible production image live in
# requirements.txt (regenerated from a clean env; see docs/RELEASE.md). Lower
# bounds here match what the test suite is proven against.
dependencies = [
    "pymupdf>=1.24",
    "google-genai>=1.0",
    "anthropic>=0.40",
    "httpx>=0.27",
    "pandas>=2.0",
    "openpyxl>=3.1",
    "python-dotenv>=1.0",
    "click>=8.1",
    "tenacity>=8.2",
    "pydantic>=2.0",
]

[project.optional-dependencies]
# Development/test extras - never installed into the production image.
dev = ["pytest>=8.0"]
# Pilot web UI (M9) - only the `web` Docker stage / UI operators need this;
# the CLI stays installable without it. Exact lock: requirements-web.txt.
web = ["streamlit==1.59.2"]

[project.scripts]
invoice-extractor = "invoice_extractor.cli:cli"

[tool.setuptools]
# Ship only the application package (never tests or local data).
packages = ["invoice_extractor", "invoice_extractor.benchmark"]

[tool.setuptools.dynamic]
version = { attr = "invoice_extractor.__version__" }
